name: Deploy React Portfolio to GitHub Pages

# This tells GitHub to run the action whenever you push code to the main branch
on:
  push:
    branches: ["main"] # Change to "master" if your default branch is called master

# Sets necessary permissions so the Action can push to your GitHub Pages environment
permissions:
  contents: read
  pages: write
  id-token: write

# Prevents multiple deployments from running at the exact same time
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # You can change this to match your local Node version
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build the App
        run: npm run build

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # If you created this app with Vite, change './build' to './dist'
          path: './build' 

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build # This ensures the deploy job waits for the build job to finish
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
